<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぽんずメモ</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#f5f0e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ぽんずメモ">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --bg2: #ede7d9;
      --card: #fdfaf5;
      --border: #d9cfc0;
      --text: #3d3428;
      --text-muted: #8a7d6b;
      --sage: #7a9e7e;
      --sage-light: #c8deca;
      --coral: #e07b6a;
      --coral-light: #f5c4bc;
      --sky: #6aaed6;
      --sky-light: #c0ddf0;
      --lavender: #9b87c0;
      --lavender-light: #d9d0ed;
      --shadow: 0 2px 8px rgba(61,52,40,0.10);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }
    /* Header */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    header .header-icon { font-size: 22px; }
    /* Views */
    .view { display: none; }
    .view.active { display: block; }
    /* List view */
    #list-view { padding: 16px; }
    .memo-list { display: flex; flex-direction: column; gap: 12px; }
    .memo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      position: relative;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
      -webkit-user-select: none;
    }
    .memo-card:active { transform: scale(0.98); }
    .memo-card-title {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
      color: var(--text);
    }
    .memo-card-preview {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .memo-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .memo-card-date { font-size: 11px; color: var(--text-muted); }
    .card-copy-btn {
      background: var(--sage-light);
      color: var(--sage);
      border: none;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card-copy-btn:active { background: var(--sage); color: #fff; }
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.6; }
    /* FAB */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 50%;
      transform: translateX(50%);
      max-width: calc(480px - 40px);
      width: calc(100% - 40px);
      background: var(--coral);
      color: #fff;
      border: none;
      border-radius: 28px;
      padding: 16px 24px;
      font-size: 16px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(224,123,106,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      z-index: 50;
    }
    .fab:active { background: #c9604d; }
    /* Edit view */
    #edit-view { padding: 16px; padding-bottom: 100px; }
    .edit-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text);
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .edit-header h2 {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--sky); }
    .form-group textarea {
      height: 220px;
      resize: none;
      line-height: 1.7;
    }
    /* Voice input area */
    .voice-area {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .voice-btn {
      background: var(--lavender-light);
      color: var(--lavender);
      border: none;
      border-radius: 24px;
      padding: 12px 18px;
      font-size: 14px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .voice-btn.recording {
      background: var(--coral);
      color: #fff;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .voice-status {
      font-size: 13px;
      color: var(--text-muted);
    }
    /* Action buttons */
    .action-row {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      z-index: 50;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.8; }
    .btn-save { background: var(--sage); color: #fff; }
    .btn-copy { background: var(--sky-light); color: var(--sky); }
    .btn-delete { background: var(--coral-light); color: var(--coral); }
    /* Long-press menu */
    .context-menu {
      position: fixed;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      z-index: 200;
      overflow: hidden;
      min-width: 160px;
    }
    .context-menu button {
      display: block;
      width: 100%;
      padding: 14px 18px;
      border: none;
      background: none;
      font-size: 15px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      text-align: left;
      cursor: pointer;
      color: var(--text);
    }
    .context-menu button:not(:last-child) { border-bottom: 1px solid var(--border); }
    .context-menu button.danger { color: var(--coral); }
    .context-menu button:active { background: var(--bg2); }
    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
    }
    .overlay.active { display: block; }
    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(61,52,40,0.88);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* Dialog */
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 250;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      display: none;
    }
    .dialog-backdrop.active { display: flex; }
    .dialog {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .dialog h3 {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .dialog p { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
    .dialog-btns { display: flex; gap: 10px; }
    .dialog-btns button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 700;
      cursor: pointer;
    }
    .dialog-cancel { background: var(--bg2); color: var(--text); }
    .dialog-confirm { background: var(--coral); color: #fff; }
  </style>
</head>
<body>
  <header>
    <span class="header-icon">📝</span>
    <h1>ぽんずメモ</h1>
  </header>

  <!-- List View -->
  <div id="list-view" class="view active">
    <div class="memo-list" id="memo-list"></div>
    <button class="fab" id="new-btn">＋ 新しいメモ</button>
  </div>

  <!-- Edit View -->
  <div id="edit-view" class="view">
    <div class="edit-header">
      <button class="back-btn" id="back-btn">←</button>
      <h2 id="edit-title-label">新しいメモ</h2>
    </div>
    <div class="form-group">
      <label>タイトル（省略可）</label>
      <input type="text" id="input-title" placeholder="タイトルを入力…">
    </div>
    <div class="form-group">
      <label>本文</label>
      <textarea id="input-body" placeholder="メモを入力…"></textarea>
    </div>
    <div class="voice-area">
      <button class="voice-btn" id="voice-btn">🎤 音声入力</button>
      <span class="voice-status" id="voice-status"></span>
    </div>
    <div class="action-row">
      <button class="btn btn-copy" id="copy-btn">📋 コピー</button>
      <button class="btn btn-save" id="save-btn">💾 保存</button>
      <button class="btn btn-delete" id="delete-btn" style="display:none">🗑 削除</button>
    </div>
  </div>

  <!-- Context menu overlay -->
  <div class="overlay" id="overlay"></div>
  <div class="context-menu" id="context-menu" style="display:none">
    <button id="ctx-edit">✏️ 編集</button>
    <button id="ctx-copy">📋 コピー</button>
    <button class="danger" id="ctx-delete">🗑 削除</button>
  </div>

  <!-- Delete dialog -->
  <div class="dialog-backdrop" id="delete-dialog">
    <div class="dialog">
      <h3>メモを削除しますか？</h3>
      <p>この操作は取り消せません。</p>
      <div class="dialog-btns">
        <button class="dialog-cancel" id="dialog-cancel">キャンセル</button>
        <button class="dialog-confirm" id="dialog-confirm">削除する</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── State ──────────────────────────────────────────────
    let memos = JSON.parse(localStorage.getItem('ponzu-memos') || '[]');
    let currentId = null;
    let contextTargetId = null;
    let deleteTargetId = null;
    let longPressTimer = null;
    let recognition = null;
    let isRecording = false;

    // ── Storage ────────────────────────────────────────────
    function save() {
      localStorage.setItem('ponzu-memos', JSON.stringify(memos));
    }

    // ── Toast ──────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── Views ──────────────────────────────────────────────
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    // ── List ───────────────────────────────────────────────
    function formatDate(ts) {
      const d = new Date(ts);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function renderList() {
      const list = document.getElementById('memo-list');
      if (memos.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="emoji">📝</div><p>メモがまだありません<br>下の「＋ 新しいメモ」から作成できます</p></div>`;
        return;
      }
      list.innerHTML = memos.map(m => `
        <div class="memo-card" data-id="${m.id}">
          ${m.title ? `<div class="memo-card-title">${escHtml(m.title)}</div>` : ''}
          <div class="memo-card-preview">${escHtml(m.body || '（本文なし）')}</div>
          <div class="memo-card-footer">
            <span class="memo-card-date">${formatDate(m.updatedAt)}</span>
            <button class="card-copy-btn" data-copy="${m.id}">📋 コピー</button>
          </div>
        </div>
      `).join('');

      // Card tap → edit
      list.querySelectorAll('.memo-card').forEach(card => {
        card.addEventListener('click', e => {
          if (e.target.closest('[data-copy]')) return;
          openEdit(card.dataset.id);
        });
        // Long press
        card.addEventListener('pointerdown', e => {
          if (e.target.closest('[data-copy]')) return;
          longPressTimer = setTimeout(() => {
            showContextMenu(card.dataset.id, e.clientX, e.clientY);
          }, 500);
        });
        card.addEventListener('pointerup', () => clearTimeout(longPressTimer));
        card.addEventListener('pointercancel', () => clearTimeout(longPressTimer));
        card.addEventListener('pointermove', () => clearTimeout(longPressTimer));
      });

      // Copy buttons in list
      list.querySelectorAll('[data-copy]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const m = memos.find(x => x.id === btn.dataset.copy);
          if (m) copyText(m.body);
        });
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Context menu ───────────────────────────────────────
    function showContextMenu(id, x, y) {
      contextTargetId = id;
      const menu = document.getElementById('context-menu');
      const overlay = document.getElementById('overlay');
      menu.style.display = 'block';
      menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
      menu.style.top = Math.min(y, window.innerHeight - 160) + 'px';
      overlay.classList.add('active');
    }

    function hideContextMenu() {
      document.getElementById('context-menu').style.display = 'none';
      document.getElementById('overlay').classList.remove('active');
      contextTargetId = null;
    }

    document.getElementById('overlay').addEventListener('click', hideContextMenu);
    document.getElementById('ctx-edit').addEventListener('click', () => {
      const id = contextTargetId;
      hideContextMenu();
      openEdit(id);
    });
    document.getElementById('ctx-copy').addEventListener('click', () => {
      const m = memos.find(x => x.id === contextTargetId);
      hideContextMenu();
      if (m) copyText(m.body);
    });
    document.getElementById('ctx-delete').addEventListener('click', () => {
      deleteTargetId = contextTargetId;
      hideContextMenu();
      document.getElementById('delete-dialog').classList.add('active');
    });

    // ── Delete dialog ──────────────────────────────────────
    document.getElementById('dialog-cancel').addEventListener('click', () => {
      document.getElementById('delete-dialog').classList.remove('active');
      deleteTargetId = null;
    });
    document.getElementById('dialog-confirm').addEventListener('click', () => {
      if (deleteTargetId) {
        memos = memos.filter(m => m.id !== deleteTargetId);
        save();
        renderList();
      }
      document.getElementById('delete-dialog').classList.remove('active');
      deleteTargetId = null;
      // If we're in edit view for this memo, go back
      if (currentId === deleteTargetId) {
        showView('list-view');
        currentId = null;
      }
      showToast('削除しました');
    });

    // ── Edit view ──────────────────────────────────────────
    function openEdit(id) {
      currentId = id || null;
      const m = id ? memos.find(x => x.id === id) : null;
      document.getElementById('edit-title-label').textContent = m ? 'メモを編集' : '新しいメモ';
      document.getElementById('input-title').value = m ? m.title || '' : '';
      document.getElementById('input-body').value = m ? m.body || '' : '';
      document.getElementById('delete-btn').style.display = m ? 'flex' : 'none';
      stopRecording();
      showView('edit-view');
    }

    document.getElementById('new-btn').addEventListener('click', () => openEdit(null));
    document.getElementById('back-btn').addEventListener('click', () => {
      stopRecording();
      showView('list-view');
      currentId = null;
    });

    document.getElementById('save-btn').addEventListener('click', () => {
      const title = document.getElementById('input-title').value.trim();
      const body = document.getElementById('input-body').value.trim();
      if (!title && !body) { showToast('タイトルか本文を入力してください'); return; }
      const now = Date.now();
      if (currentId) {
        const m = memos.find(x => x.id === currentId);
        if (m) { m.title = title; m.body = body; m.updatedAt = now; }
      } else {
        const newMemo = { id: String(now), title, body, createdAt: now, updatedAt: now };
        memos.unshift(newMemo);
        currentId = newMemo.id;
      }
      // Keep newest first
      memos.sort((a, b) => b.updatedAt - a.updatedAt);
      save();
      renderList();
      showToast('保存しました');
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
      const body = document.getElementById('input-body').value;
      copyText(body);
    });

    document.getElementById('delete-btn').addEventListener('click', () => {
      deleteTargetId = currentId;
      document.getElementById('delete-dialog').classList.add('active');
    });

    // Override delete confirm to also go back to list if in edit view
    document.getElementById('dialog-confirm').addEventListener('click', () => {}, true);
    // (already handled above)

    // ── Copy ───────────────────────────────────────────────
    function copyText(text) {
      if (!text) { showToast('コピーする内容がありません'); return; }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text)
          .then(() => showToast('📋 コピーしました'))
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand('copy');
        showToast('📋 コピーしました');
      } catch {
        showToast('コピーできませんでした。テキストを長押しでコピーしてください');
      }
      document.body.removeChild(ta);
    }

    // ── Voice input ────────────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const voiceBtn = document.getElementById('voice-btn');
    const voiceStatus = document.getElementById('voice-status');

    if (!SpeechRecognition) {
      voiceBtn.disabled = true;
      voiceBtn.style.opacity = '0.5';
      voiceStatus.textContent = 'お使いの環境では音声入力がご利用いただけません';
    } else {
      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.continuous = true;
      recognition.interimResults = true;

      let interimStart = -1;

      recognition.onstart = () => {
        isRecording = true;
        voiceBtn.classList.add('recording');
        voiceBtn.textContent = '⏹ 停止';
        voiceStatus.textContent = '認識中…';
        interimStart = -1;
      };

      recognition.onresult = e => {
        const body = document.getElementById('input-body');
        let interim = '';
        let finalText = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            finalText += e.results[i][0].transcript;
          } else {
            interim += e.results[i][0].transcript;
          }
        }
        if (finalText) {
          // Remove interim placeholder and append final
          if (interimStart >= 0) {
            body.value = body.value.slice(0, interimStart);
            interimStart = -1;
          }
          body.value += finalText;
        }
        if (interim) {
          if (interimStart < 0) interimStart = body.value.length;
          body.value = body.value.slice(0, interimStart) + interim;
        }
        voiceStatus.textContent = interim ? `（${interim}）` : '認識中…';
      };

      recognition.onerror = e => {
        const msgs = { 'no-speech': '音声が検出されませんでした', 'not-allowed': 'マイクの使用が許可されていません', 'network': 'ネットワークエラーが発生しました' };
        voiceStatus.textContent = msgs[e.error] || 'エラーが発生しました';
        stopRecording();
      };

      recognition.onend = () => {
        if (isRecording) recognition.start(); // keep going until manually stopped
      };

      voiceBtn.addEventListener('click', () => {
        if (isRecording) stopRecording();
        else startRecording();
      });
    }

    function startRecording() {
      if (!recognition) return;
      isRecording = true;
      recognition.start();
    }

    function stopRecording() {
      if (!recognition) return;
      isRecording = false;
      recognition.onend = null;
      try { recognition.stop(); } catch {}
      voiceBtn.classList.remove('recording');
      voiceBtn.textContent = '🎤 音声入力';
      voiceStatus.textContent = '';
    }

    // ── Init ───────────────────────────────────────────────
    renderList();

    // SW registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
